<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart VinoStock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="pb-28">

    <header class="p-6 flex justify-between items-center">
        <div>
            <p class="text-amber-500 text-[10px] font-bold tracking-[0.3em] uppercase">Bodega Inteligente</p>
            <h1 class="text-3xl font-serif italic text-white">Smart VinoStock</h1>
        </div>
        <i class="fas fa-wine-bottle text-2xl text-amber-500/50"></i>
    </header>

    <div class="px-6 mb-6">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" placeholder="Buscar por nombre o D.O..." 
                   class="w-full bg-slate-800/40 border border-white/5 p-4 pl-12 rounded-2xl text-white outline-none focus:ring-2 focus:ring-amber-600/50">
        </div>
    </div>

    <main class="px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="wineGrid"></main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-slate-900/80 backdrop-blur-2xl border border-white/10 h-16 rounded-3xl shadow-2xl flex justify-around items-center z-50">
        <button onclick="location.reload()" class="text-slate-400 flex flex-col items-center">
            <i class="fas fa-sync-alt"></i>
            <span class="text-[8px] mt-1 uppercase font-bold">Sincronizar</span>
        </button>
        <div class="w-14 h-14 bg-gradient-to-br from-orange-800 to-red-950 rounded-full -mt-12 border-4 border-[#0f172a] flex items-center justify-center text-white shadow-xl">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <button onclick="alert('Función de reporte lista próximamente')" class="text-slate-400 flex flex-col items-center">
            <i class="fas fa-list-ul"></i>
            <span class="text-[8px] mt-1 uppercase font-bold">Inventario</span>
        </button>
    </nav>

    <script>
        async function init() {
            try {
                const res = await fetch('vinos.json');
                const inventory = await res.json();
                render(inventory);

                document.getElementById('searchInput').oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    render(inventory.filter(v => v.nombre.toLowerCase().includes(term) || v.do.toLowerCase().includes(term)));
                };
            } catch (e) { console.error("Error cargando bodega"); }
        }

        function render(items) {
            const grid = document.getElementById('wineGrid');
            grid.innerHTML = items.map((w, i) => `
                <div class="glass-card wine-card" style="animation-delay: ${i * 0.03}s">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-[9px] font-bold text-amber-500 uppercase tracking-widest">${w.do}</span>
                            <h3 class="text-lg font-bold text-white leading-tight">${w.nombre}</h3>
                            <p class="text-xs text-slate-400 mt-1">${w.uva}</p>
                        </div>
                        <span class="font-bold text-white text-sm">${w.precio.toFixed(2)}€</span>
                    </div>
                    <div class="flex items-center justify-between bg-black/20 rounded-xl p-3">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase">Stock</p>
                            <span class="text-3xl font-black ${w.stock < 5 ? 'text-red-500' : 'text-white'}">${w.stock}</span>
                        </div>
                        <div class="flex gap-2">
                            <button class="btn-stock btn-minus">-</button>
                            <button class="btn-stock btn-plus">+</button>
                        </div>
                    </div>
                    ${w.stock < 5 ? `<div class="low-stock-alert"><i class="fas fa-exclamation-triangle"></i> Stock Crítico</div>` : ''}
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
