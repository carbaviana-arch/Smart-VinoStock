<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart VinoStock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Azul muy oscuro casi negro */
            color: #f8fafc;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Efecto Cristal */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.9);
        }

        /* Gradiente de marca */
        .brand-gradient {
            background: linear-gradient(135deg, #7c2d12 0%, #450a0a 100%);
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease forwards; }

        /* Estilo para los botones de stock */
        .btn-stock {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
    </style>
</head>
<body class="pb-24">

    <header class="p-6">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-amber-500 text-xs font-bold tracking-[0.2em] uppercase">Control de Bodega</p>
                <h1 class="text-3xl font-serif mt-1 italic text-white">Smart VinoStock</h1>
            </div>
            <div class="h-12 w-12 rounded-full border-2 border-amber-500/30 flex items-center justify-center text-amber-500">
                <i class="fas fa-wine-glass-alt text-xl"></i>
            </div>
        </div>
    </header>

    <section class="px-6 mb-8">
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" placeholder="Buscar etiqueta o D.O..." 
                   class="w-full bg-slate-800/50 border border-slate-700 p-4 pl-12 rounded-2xl focus:outline-none focus:ring-2 focus:ring-amber-500/50 text-white placeholder-slate-500 transition-all">
        </div>
    </section>

    <main class="px-6 grid grid-cols-1 md:grid-cols-2 gap-4" id="wineGrid">
        </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/90 backdrop-blur-xl border border-white/10 h-16 rounded-3xl shadow-2xl flex justify-around items-center px-4 z-50">
        <button onclick="location.reload()" class="text-slate-400 hover:text-amber-500 flex flex-col items-center">
            <i class="fas fa-redo-alt text-lg"></i>
            <span class="text-[9px] uppercase mt-1">Refrescar</span>
        </button>
        
        <button class="brand-gradient w-14 h-14 rounded-full -mt-12 border-4 border-[#0f172a] shadow-xl flex items-center justify-center text-white">
            <i class="fas fa-plus text-xl"></i>
        </button>

        <button onclick="alert('Exportando a PDF... próximamente')" class="text-slate-400 hover:text-amber-500 flex flex-col items-center">
            <i class="fas fa-file-download text-lg"></i>
            <span class="text-[9px] uppercase mt-1">Reporte</span>
        </button>
    </nav>

    <script>
        let inventory = [];

        async function init() {
            try {
                const response = await fetch('vinos.json');
                inventory = await response.json();
                render(inventory);
            } catch (e) {
                document.getElementById('wineGrid').innerHTML = `<p class="text-red-400 text-center col-span-full">Error al conectar con la bodega.</p>`;
            }
        }

        function render(data) {
            const grid = document.getElementById('wineGrid');
            grid.innerHTML = data.map((wine, index) => `
                <div class="glass-card rounded-3xl p-5 animate-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-[10px] font-bold text-amber-500/80 tracking-widest uppercase">${wine.do}</span>
                            <h3 class="text-xl font-semibold text-white leading-tight mt-1">${wine.nombre}</h3>
                            <p class="text-sm text-slate-400 font-light mt-1">${wine.uva}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-bold text-white">${wine.precio.toFixed(2)}€</span>
                        </div>
                    </div>

                    <div class="flex items-end justify-between bg-white/5 rounded-2xl p-4">
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Stock Disponible</p>
                            <div class="flex items-baseline gap-2">
                                <span class="text-4xl font-extrabold ${wine.stock < 5 ? 'text-red-500' : 'text-white'}">
                                    ${wine.stock}
                                </span>
                                <span class="text-slate-500 text-sm italic">botellas</span>
                            </div>
                        </div>
                        
                        <div class="flex gap-2">
                            <button class="btn-stock bg-slate-700/50 hover:bg-slate-600 text-white">-</button>
                            <button class="btn-stock bg-amber-600 hover:bg-amber-500 text-white shadow-lg shadow-amber-900/20">+</button>
                        </div>
                    </div>
                    
                    ${wine.stock < 5 ? `
                        <div class="mt-3 flex items-center gap-2 text-red-400 text-[11px] font-bold uppercase tracking-tighter">
                            <i class="fas fa-exclamation-circle"></i> Reponer Stock Urgentemente
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = inventory.filter(w => 
                w.nombre.toLowerCase().includes(term) || 
                w.do.toLowerCase().includes(term)
            );
            render(filtered);
        });

        init();
    </script>
</body>
</html>
